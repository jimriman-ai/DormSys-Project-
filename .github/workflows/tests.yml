name: Tests

on:
  push:
    branches:
      - '**'
  pull_request:
  workflow_dispatch:

jobs:
  tests:
    name: Laravel & Architecture Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_DB: dormsys_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      APP_ENV: testing
      APP_KEY: base64:2fl+KtvkphvQd2nfxDirvEEAhpj8Q6fR3f9JvoJod0o=
      APP_DEBUG: true
      APP_TIMEZONE: UTC
      DB_CONNECTION: pgsql
      DB_HOST: 127.0.0.1
      DB_PORT: 5432
      DB_DATABASE: dormsys_test
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      CACHE_STORE: redis
      QUEUE_CONNECTION: redis
      SESSION_DRIVER: array
      REDIS_HOST: 127.0.0.1
      REDIS_PORT: 6379
      TELESCOPE_ENABLED: false
      PULSE_ENABLED: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: pgsql, redis, mbstring, xml, curl, zip, bcmath, intl
          coverage: none

      - name: Get Composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> "$GITHUB_OUTPUT"

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Prepare application environment
        run: |
          cp .env.example .env
          php artisan key:generate --ansi

      - name: Run database migrations
        run: php artisan migrate --force --ansi

      - name: Run architecture decay prevention checks
        run: composer run arch -- --ansi

      - name: Run test suite
        run: composer run test -- --ansi
